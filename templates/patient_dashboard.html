<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Dashboard</title>
    <!-- <link rel="stylesheet" href="../static/patient_dashboard.css"> -->
     <link rel="stylesheet" href="{{url_for('static',filename='dashboard.css')}}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
            <h2>HMS</h2>
            <P>Hospital Management System</P>
            <a href="{{url_for('patient_dashboard')}}" class="active"><i class="fa-solid fa-house"></i>Dashboard</a>
            <a href="{{url_for('patient_profile')}}"><i class="fa-solid fa-user"></i>Profile</a>
            <a href="{{url_for('patient_bookAppointment')}}"><i class="fa-solid fa-calendar-check"></i>Book Appointments</a>
            <a href="{{url_for('patient_myAppointment')}}"><i class="fa-solid fa-list"></i>My Appointments</a>
            <a href="{{url_for('patient_prescription')}}"><i class="fa-solid fa-prescription"></i>Prescriptions</a>
            <a href="{{url_for('patient_medicalReport')}}"><i class="fa-solid fa-file-medical"></i>Medical Records</a>
            <a href="#"><i class="fa-solid fa-credit-card"></i>Bills & Payments</a>
             <a href="#"><i class="fa-solid fa-right-from-bracket"></i>Logout</a>
        </div>
         <div class="main">
        <h1>Patient Dashboard</h1>
        <div class="cards">
            <div class="card">
                <p>Total Appointments</p>
                <p>{{total_appointments}}</p>
            </div>
             <div class="card">
                <p>Prescriptions</p>
                 <p>{{total_prescriptions}}</p>
            </div>
             <div class="card">
                <p>Medical Records</p>
                 <p>{{total_records}}</p>
            </div>
        </div>
        <div class="section">
             <h2>Quick Actions</h2>
             <div class="actions">
                <a href="{{url_for('patient_bookAppointment')}}">
                    <button>Add Appointments</button>
                </a>
                <a href="{{url_for('patient_myAppointment')}}">
                    <button>View Appointments</button>
                </a>
                <a href="{{url_for('patient_prescription')}}">
                    <button>View Prescriptions</button>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
