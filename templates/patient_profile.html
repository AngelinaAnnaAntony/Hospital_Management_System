<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Profile</title>

    <link rel="stylesheet"
          href="{{url_for('static',filename='page.css')}}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="main">
        <div class="sidebar">
            <div class="logo">
                <h2>HMS</h2>
                 <p>Hospital Management System</p>
            </div>

            <div class="menu">

            <a href="{{url_for('patient_dashboard')}}">
                <i class="fa-solid fa-house"></i> Dashboard
            </a>

            <a href="{{url_for('patient_profile')}}" class="active">
                <i class="fa-solid fa-user"></i> Profile
            </a>

            <a href="{{url_for('patient_bookAppointment')}}">
                <i class="fa-solid fa-calendar-check"></i> Book Appointments
            </a>

            <a href="{{url_for('patient_myAppointment')}}">
                <i class="fa-solid fa-list"></i> My Appointments
            </a>

            <a href="{{url_for('patient_prescription')}}">
                <i class="fa-solid fa-prescription"></i> Prescriptions
            </a>

            <a href="{{url_for('patient_medicalReport')}}">
                <i class="fa-solid fa-file-medical"></i> Medical Records
            </a>

            <a href="#">
                <i class="fa-solid fa-credit-card"></i> Bills & Payments
            </a>

            <a href="#">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
            </div>
        </div>
        <div class="content">
            <div class="topbar">
                <h1 class="page-title">Personal Information</h1>
                <div class="profile">
                    <i class="fa-solid fa-user-circle"></i>
                    Patient
                </div>
            </div>
            <div class="card">
                    <form>

                        <div class="form-row">
                            <div class="form-group">
                                <label><strong>Full Name</strong></label>
                                <input type="text" name="fullname" required>
                            </div>
                        

                            <div class="form-group">
                                <label><strong>Age</strong></label>
                                <input type="number" name="age" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label><strong>Gender</strong></label>
                                <select name="gender">
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label><strong>Phone Number</strong></label>
                                <input type="tel" name="phone" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label><strong>Email</strong></label>
                                <input type="email" name="email" required>
                            </div>
        

                            <div class="form-group">
                                <label><strong>Address</strong></label>
                                <textarea rows="4" cols="30"
                                      name="address" required></textarea>
                            </div>
                        </div>

                        <button type="submit" class="btn">
                            Save Profile
                        </button>
                    </form>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
