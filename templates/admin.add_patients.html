<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Patient</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="{{url_for('static',filename='page.css')}}">
</head>
<body>

<div class="main">
    <div class="sidebar">

        <div class="logo">
            <h2>HMS</h2>
            <p>Hospital Management System</p>
        </div>

        <div class="menu">

            <a href="/">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </a>

            <a href="/viewpatients">
                <i class="fa-solid fa-user"></i>
                Patient Records
            </a>

            <a href="/viewappointments">
                <i class="fa-solid fa-calendar"></i>
                Appointments
            </a>

            <a href="/view_doc">
                <i class="fa-solid fa-user-doctor"></i>
                Doctors
            </a>

            <a href="/view_bill">
                <i class="fa-solid fa-file-invoice"></i>
                Billing
            </a>
             <a href="/"> 
               <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </a>
        </div>

    </div>
    <div class="content">
        <div class="topbar">
            <h1 class="page-title">Add Patient</h1>
            <div class="profile">
                <i class="fa-solid fa-user-circle"></i>
                Admin
            </div>

        </div>
        <div class="card">

            <form action="/add_patient" method="POST">

                <h3>Personal Information</h3>

                <div class="form-row">

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="name" required>
                    </div>

                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" name="age" required>
                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label>Blood Group</label>
                        <input type="text" name="blood_group" required>
                    </div>

                </div>

                <div class="form-group">
                    <label>Gender</label>

                    <div class="gender">

                        <label>
                            <input type="radio" name="gender" value="Male" required>
                            Male
                        </label>

                        <label>
                            <input type="radio" name="gender" value="Female">
                            Female
                        </label>

                        <label>
                            <input type="radio" name="gender" value="Other">
                            Other
                        </label>

                    </div>
                </div>

                <h3>Medical Information</h3>

                <div class="form-group">
                    <label>Allergies</label>
                    <textarea rows="4" name="allergies" ></textarea>
                </div>

                <div class="form-group">
                    <label>Existing Medical Conditions</label>
                    <textarea rows="4" name="medical_conditions" ></textarea>
                </div>

                <div class="form-row">

                    <div class="form-group">
                        <label>Emergency Contact Name</label>
                        <input type="text" name="emergency_name">
                    </div>

                    <div class="form-group">
                        <label>Emergency Contact Number</label>
                        <input type="text" name="emergency_number">
                    </div>

                </div>

                <button type="submit" class="btn">
                    Register Patient
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
