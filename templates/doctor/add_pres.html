    <h1>Add Prescription</h1>
    <div class="section">
    <form method="POST">
        <label>Patient ID</label>
        <input type="text" name="p_id" placeholder="Enter id">
        <br><br>
        <label>Patient Name</label>
        <input type="text" name="patient" placeholder="Enter name">
        <br><br>
        <label>Medicine</label>
        <input type="text" name="medicine" placeholder="Enter medicine">
        <br><br>
        <label>Dosage</label>
        <input type="text" name="dosage" placeholder="Enter dosage">
        <br><br>
        <button type="submit">Submit</button>
    </form>
</div>
