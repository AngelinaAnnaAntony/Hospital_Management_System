<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet"
      href="{{ url_for('static', filename='doctor_dashboard.css') }}">
</head>
<body>
    <div class="sidebar">
        <h2>Doctor Panel</h2>
        <a href="/doctor_dashboard">Dashboard</a>
        <a href="/doc-view_appointments">Appointments</a>
        <a href="/doc-view_patients">Patients</a>
        <a href="/doc-med_rec">Patient Medical Records</a>
        <a href="/doc-view_profile">Profile</a>
        <a href="/logout">Logout</a>
    </div>
    <div class="main">
        <h1>Doctor Dashboard</h1>
        <div class="cards">
            <div class="card">
                <h2>25</h2>
                <p>Today's Appointments</p>
            </div>
            <div class="card">
                <h2>120</h2>
                <p>Total Patients</p>
            </div>
            <div class="card">
                <h2>15</h2>
                <p>Prescriptions Issued</p>
            </div>
        </div>

        <div class="section">
            <h2>Quick Actions</h2>
            <div class="actions">
               <a href="/doc-view_appointments">
               <button><h3>View Appointments</h3></button>
               </a>
               <a href="/doc-view_patients">
               <button><h3>View Patients</h3></button>
               </a>
               <a href="/add_pres">
               <button><h3>Add Prescription</h3></button>
               </a>
            </div>
        </div>
    </div>
</body>
</html>
