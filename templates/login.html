<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
       <link rel="stylesheet" href="{{ url_for('static', filename='stylelogin.css') }}">
</head>
<body>

    <div class="login-container">
        <h2>Login</h2>

        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;font-size:16px">Sign In</button>
        </form>

        <!-- <form method="POST">
            <input type="text" placeholder="Username" name="username" required>
            <input type="password" placeholder="Password" name="password"required>

            <button type="submit">Login</button>
        </form> -->

        <div class="footer">
            <p>Don't have an account? <a href="register">Sign Up</a></p>
        </div>
            <p style="text-align:center;font-size:12px;color:var(--gray)">
            <strong>Demo Login:</strong><br>
            Admin: admin / admin123<br>
            Patient: patient / patient123<br>
            Doctor: doctor / doctor123
        </p>
    </div>
</body>
</html>
