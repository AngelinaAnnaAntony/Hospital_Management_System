<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../static/table.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="main">
        <div class="sidebar">
            <div class="logo">
                <h2>HMS</h2>
                <p>Hospital Management System</p>
            </div>
            <div class="menu">
                 <a href="doctor_dashboard.html"><i class="fa-solid fa-house"></i>Dashboard</a>
                <a href="view_appointments.html"><i class="fa-solid fa-list"></i>Appointments</a>
                <a href="view_patients.html"><i class="fa-solid fa-user-injured"></i>Patients</a>
                <a href="diagnosis.html"><i class="fa-solid fa-notes-medical"></i>Diagnosis</a>
                <a href="view_profile.html" class="active"><i class="fa-solid fa-user"></i>Profile</a>
                <a href="logout.html"><i class="fa-solid fa-right-from-bracket"></i>Logout</a>
            </div>
        </div>
        <div class="content">
            <div class="topbar">
                <h1 class="page-title">Doctor Profile</h1>
                <div class="profile">
                    <i class="fa-solid fa-user"></i>
                    Doctor
                </div>
            </div>
        <div class="card">
            <form method="POST">
                <div class="form-row">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" name="name" placeholder="Enter name">
                    </div>
                </div>
                <div class="form-group">
                     <label>Email</label>
                    <input type="email" name="email" placeholder="Enter email">
                </div>

                <div class="form-group">
                    <label>Specialization</label>
                    <input type="text" name="specialization" placeholder="Enter specialization">
                </div>
                <button type="submit" class="btn"> Save Profile </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
